# .yarnrc.yml

# Security: Restrict Git dependencies (only allow trusted sources)
#approvedGitRepositories:
#  - "https://github.com/your-org/*"  # Replace with your org or specific repos
#  - "ssh://git@github.com/your-org/*"
# Add more as needed, e.g., yarnpkg itself, popular trusted repos

# Security: Disable postinstall scripts by default (strongly recommended)
# Only enable for specific trusted packages via dependenciesMeta in package.json
enableScripts: false

# Security: Require packages to be at least 3 days old (adjust as needed)
# Prevents "zero-day" compromised packages from being installed
npmMinimalAgeGate: "3d"  # or "1w", "7d", etc. (supports minutes/days/weeks)

# Optional but recommended security / stability settings
enableHardenedMode: true          # Extra validation against tampering
enableGlobalCache: true           # Better caching + sharing across projects
npmRegistryServer: "https://registry.yarnpkg.com"  # Explicit if you use custom registries

# Yarn version (keep this pinned)
yarnPath: .yarn/releases/yarn-4.17.0.cjs
